name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Ubuntu runner'da Android SDK /usr/local/lib/android/sdk altında geliyor
      - name: Configure Android SDK
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          echo "$ANDROID_SDK/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install required SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup signing keystore
        run: |
          mkdir -p ~/.android
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ~/.android/wattly-release.jks
            echo "KEYSTORE_PATH=$HOME/.android/wattly-release.jks" >> $GITHUB_ENV
            echo "KEYSTORE_ALIAS=wattly" >> $GITHUB_ENV
            echo "KEYSTORE_PASS=wattly123" >> $GITHUB_ENV
            echo "KEY_PASS=wattly123" >> $GITHUB_ENV
            echo "USE_RELEASE_SIGN=true" >> $GITHUB_ENV
          else
            if [ ! -f ~/.android/debug.keystore ]; then
              keytool -genkey -v \
                -keystore ~/.android/debug.keystore \
                -alias androiddebugkey \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -storepass android -keypass android \
                -dname "CN=Android Debug,O=Android,C=US"
            fi
            echo "USE_RELEASE_SIGN=false" >> $GITHUB_ENV
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/

      - name: Build APK
        run: |
          if [ "$USE_RELEASE_SIGN" = "true" ]; then
            cd android && ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASS \
              -Pandroid.injected.signing.key.alias=$KEYSTORE_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASS
          else
            cd android && ./gradlew assembleDebug --no-daemon
          fi

      - name: Show build error details
        if: failure()
        run: |
          if [ "$USE_RELEASE_SIGN" = "true" ]; then
            cd android && ./gradlew assembleRelease --no-daemon --info 2>&1 | tail -80 >> $GITHUB_STEP_SUMMARY || true
          else
            cd android && ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -80 >> $GITHUB_STEP_SUMMARY || true
          fi

      - name: Get version
        id: pkg
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          if [ "$USE_RELEASE_SIGN" = "true" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk \
               "wattly-v${{ steps.pkg.outputs.VERSION }}.apk"
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk \
               "wattly-v${{ steps.pkg.outputs.VERSION }}.apk"
          fi

      - name: Delete existing release
        run: gh release delete "v${{ steps.pkg.outputs.VERSION }}" --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing tag
        run: git push origin --delete "v${{ steps.pkg.outputs.VERSION }}" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.VERSION }}
          name: "Wattly v${{ steps.pkg.outputs.VERSION }}"
          body: |
            🤖 Otomatik build — ${{ github.sha }}
            **Kurulum:** APK'yı indirip telefona kur
          files: wattly-v${{ steps.pkg.outputs.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
