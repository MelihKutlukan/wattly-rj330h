name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Android SDK
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          echo "$ANDROID_SDK/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install required SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/wattly-release.jks

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/

      - name: Build release APK
        run: |
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=/tmp/wattly-release.jks \
            -Pandroid.injected.signing.store.password=wattly123 \
            -Pandroid.injected.signing.key.alias=wattly \
            -Pandroid.injected.signing.key.password=wattly123

      - name: Show build error details
        if: failure()
        run: cd android && ./gradlew assembleRelease --no-daemon --info 2>&1 | tail -80 >> $GITHUB_STEP_SUMMARY || true

      - name: Get version
        id: pkg
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             "wattly-v${{ steps.pkg.outputs.VERSION }}.apk"

      - name: Delete existing release
        run: gh release delete "v${{ steps.pkg.outputs.VERSION }}" --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing tag
        run: git push origin --delete "v${{ steps.pkg.outputs.VERSION }}" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.VERSION }}
          name: "Wattly v${{ steps.pkg.outputs.VERSION }}"
          body: |
            🤖 Otomatik build — ${{ github.sha }}
            **Kurulum:** APK'yı indirip telefona kur
          files: wattly-v${{ steps.pkg.outputs.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
