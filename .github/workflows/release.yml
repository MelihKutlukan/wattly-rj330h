name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: wattly-debug-keystore-v1

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Create local.properties (Gradle SDK yolu)
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Copy web assets to Android (manuel)
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Get version from package.json
        id: pkg
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "wattly-v${{ steps.pkg.outputs.VERSION }}.apk"

      - name: Delete existing release if same tag exists
        run: gh release delete "v${{ steps.pkg.outputs.VERSION }}" --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing tag if exists
        run: git push origin --delete "v${{ steps.pkg.outputs.VERSION }}" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.VERSION }}
          name: "Wattly v${{ steps.pkg.outputs.VERSION }}"
          body: |
            🤖 Otomatik build
            📦 Commit: ${{ github.sha }}
            🕐 Tarih: ${{ github.event.head_commit.timestamp }}

            **Kurulum:** APK'yı indirip telefona kur (mevcut uygulamanın üzerine yazar)
          files: wattly-v${{ steps.pkg.outputs.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
